name: Deploy docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "mdinterface/**"
      - "mkdocs.yml"
      - "pyproject.toml"

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r docs/requirements.txt
          pip install -e .

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force

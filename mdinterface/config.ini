# config.ini
[settings]
# Point BOSSdir to your BOSS backend.  Three modes are supported:
#
#   Native installation (requires csh on the host):
#BOSSdir = /path/to/boss
#
#   Apptainer/Singularity container (recommended on HPC):
#BOSSdir = /path/to/boss-container.sif
#
#   Docker image (recommended for local development):
#BOSSdir = boss-container:latest

